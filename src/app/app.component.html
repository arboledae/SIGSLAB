<router-outlet></router-outlet>

<div class="toast-container position-fixed p-3" style="top: 20px; right: 20px; z-index: 9999; pointer-events: none;">
  <div *ngFor="let toast of toastService.toasts" 
       class="toast show shadow border-left-brand mb-2" 
       [ngClass]="'border-left-' + toast.type"
       style="pointer-events: auto; min-width: 300px; background-color: white; border-radius: 0.35rem; border: 1px solid rgba(0,0,0,0.08);"
       role="alert" aria-live="assertive" aria-atomic="true">
    <div class="toast-header d-flex justify-content-between align-items-center py-2 px-3 border-bottom-0" style="background: transparent;">
      <strong class="mr-auto font-weight-bold" [ngClass]="'text-' + toast.type" style="font-size: 0.9rem;">
        <i class="fas mr-1" [ngClass]="{
          'fa-check-circle': toast.type === 'success',
          'fa-exclamation-triangle': toast.type === 'danger' || toast.type === 'warning',
          'fa-info-circle': toast.type === 'info'
        }"></i>
        {{ toast.title }}
      </strong>
      <button type="button" class="close font-weight-bold" (click)="toastService.remove(toast)" aria-label="Close" style="font-size: 1.2rem; line-height: 1; outline: none;">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
    <div class="toast-body px-3 pb-3 pt-0 text-dark" style="font-size: 0.85rem; line-height: 1.4;">
      {{ toast.message }}
    </div>
  </div>
</div>
