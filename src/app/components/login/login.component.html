<div class="bg-login-gradient" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-xl-6 col-lg-8 col-md-9">
        <div class="card o-hidden border-0 shadow-lg my-5" style="border-radius: 1rem; overflow: hidden;">
          <div class="card-body p-0">
            <div class="p-5">
              <div class="text-center mb-4">
                <div class="sidebar-brand-icon rotate-n-15 text-primary mb-2" style="font-size: 3rem;">
                  <i class="fas fa-tools"></i>
                </div>
                <h1 class="h3 text-gray-900 font-weight-bold">SIGSLAB</h1>
                <p class="text-dark" style="color: black !important;">Sistema Integral de Gestión de Soporte y Laboratorios</p>
              </div>

              <form class="user" (submit)="onSubmit($event)">
                <div class="form-group">
                  <label for="emailInput" class="text-dark font-weight-bold small" style="color: black !important;">Correo Electrónico:</label>
                  <input type="email" class="form-control form-control-user" id="emailInput" name="email"
                    [(ngModel)]="emailInput" style="color: #333333 !important; font-weight: 500;" required>
                </div>

                <div class="form-group">
                  <label for="passwordInput" class="text-dark font-weight-bold small" style="color: black !important;">Contraseña:</label>
                  <div class="position-relative">
                    <input [type]="showPassword ? 'text' : 'password'" class="form-control form-control-user" id="passwordInput" name="password"
                      [(ngModel)]="passwordInput" style="padding-right: 50px; color: #333333 !important; font-weight: 500;" required>
                    <button type="button" (click)="togglePasswordVisibility()" class="btn position-absolute"
                      style="right: 15px; top: 50%; transform: translateY(-50%); border: none; background: transparent; z-index: 10; color: #5a5c69; padding: 0;">
                      <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </button>
                  </div>
                </div>

                <button type="submit" class="btn btn-primary btn-user btn-block font-weight-bold"
                  style="font-size: 1rem; padding: 10px;">
                  <i class="fas fa-sign-in-alt mr-2"></i> Iniciar Sesión
                </button>
              </form>

              <hr>
              <div class="text-center small text-muted">
                MVP 1 - Control de soporte técnico
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
