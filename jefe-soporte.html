<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="SIGSLAB - Portal Jefe de Soporte">
    <meta name="author" content="SIGSLAB Team">

    <title>SIGSLAB - Portal Jefe de Soporte</title>

    <!-- Custom fonts for this template-->
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <link href="css/sigslab.css" rel="stylesheet">
</head>

<body id="page-top">

    <!-- Page Wrapper -->
    <div id="wrapper">

        <!-- Sidebar -->
        <ul class="navbar-nav sidebar sidebar-dark accordion" id="accordionSidebar">

            <!-- Sidebar - Brand -->
            <a class="sidebar-brand d-flex align-items-center justify-content-center" href="jefe-soporte.html">
                <div class="sidebar-brand-icon rotate-n-15">
                    <i class="fas fa-tools"></i>
                </div>
                <div class="sidebar-brand-text mx-3">SIGSLAB <sup>Soporte</sup></div>
            </a>

            <!-- Divider -->
            <hr class="sidebar-divider my-0">

            <!-- Nav Item - Dashboard -->
            <li class="nav-item active">
                <a class="nav-link" href="jefe-soporte.html">
                    <i class="fas fa-fw fa-tachometer-alt"></i>
                    <span>Panel de Control</span></a>
            </li>

            <!-- Divider -->
            <hr class="sidebar-divider">

            <!-- Divider -->
            <hr class="sidebar-divider d-none d-md-block">

            <!-- Sidebar Toggler -->
            <div class="text-center d-none d-md-inline">
                <button class="rounded-circle border-0" id="sidebarToggle"></button>
            </div>
        </ul>
        <!-- End of Sidebar -->

        <!-- Content Wrapper -->
        <div id="content-wrapper" class="d-flex flex-column">

            <!-- Main Content -->
            <div id="content">

                <!-- Topbar -->
                <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">
                    <!-- Sidebar Toggle (Topbar) -->
                    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3">
                        <i class="fa fa-bars"></i>
                    </button>

                    <!-- Topbar Title -->
                    <h5 class="m-0 font-weight-bold text-gray-800 d-none d-md-inline-block">Panel de Control</h5>

                    <!-- Topbar Navbar -->
                    <ul class="navbar-nav ml-auto">
                        <div class="topbar-divider d-none d-sm-block"></div>

                        <!-- Nav Item - User Information -->
                        <li class="nav-item dropdown no-arrow">
                            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                <span class="mr-2 d-none d-lg-inline text-gray-600 small" id="userNameDisplay">Jefe de Soporte</span>
                                <img class="img-profile rounded-circle" src="img/undraw_profile.svg">
                            </a>
                            <!-- Dropdown - User Information -->
                            <div class="dropdown-menu dropdown-menu-right shadow animated--grow-in" aria-labelledby="userDropdown">
                                <a class="dropdown-item" href="#" id="btnLogoutBtn">
                                    <i class="fas fa-sign-out-alt fa-sm fa-fw mr-2 text-gray-400"></i>
                                    Cerrar Sesión
                                </a>
                            </div>
                        </li>
                    </ul>
                </nav>
                <!-- End of Topbar -->

                <!-- Begin Page Content -->
                <div class="container-fluid">

                    <!-- Alert Placeholder -->
                    <div id="alertPlaceholder"></div>

                    <!-- Main Grid Table -->
                    <div class="card shadow mb-4">
                        <div class="card-header py-3 d-flex justify-content-between align-items-center">
                            <h6 class="m-0 font-weight-bold text-primary"><i class="fas fa-ticket-alt mr-2"></i>Matriz de Tickets</h6>
                            <button class="btn btn-sm btn-light border" onclick="loadJefeDashboard()"><i class="fas fa-sync-alt text-primary"></i> Recargar</button>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-bordered table-striped" id="jefeTicketsTable" width="100%" cellspacing="0" style="font-size: 0.9rem;">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Tipo</th>
                                            <th>Laboratorio</th>
                                            <th>Equipo</th>
                                            <th>Descripción</th>
                                            <th>Creado Por</th>
                                            <th>Fecha Reporte</th>
                                            <th>Estado</th>
                                            <th>Asignado A</th>
                                            <th>Acción</th>
                                        </tr>
                                    </thead>
                                    <tbody id="jefeTicketsBody">
                                        <!-- Dynamic tickets content -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                </div>
                <!-- /.container-fluid -->

            </div>
            <!-- End of Main Content -->

            <!-- Footer -->
            <footer class="sticky-footer bg-white">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>SIGSLAB MVP 1 &copy; 2026</span>
                    </div>
                </div>
            </footer>
            <!-- End of Footer -->

        </div>
        <!-- End of Content Wrapper -->

    </div>
    <!-- End of Page Wrapper -->

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fas fa-angle-up"></i>
    </a>

    <!-- Assign Modal -->
    <div class="modal fade" id="assignModal" tabindex="-1" role="dialog" aria-labelledby="assignModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content border-left-primary shadow">
                <div class="modal-header">
                    <h5 class="modal-title font-weight-bold text-primary" id="assignModalLabel"><i class="fas fa-user-plus mr-2"></i>Asignar Ticket de Soporte</h5>
                    <button class="close" type="button" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">×</span>
                    </button>
                </div>
                <form id="assignForm">
                    <div class="modal-body">
                        <div class="form-group">
                            <label class="font-weight-bold text-gray-700">ID del Ticket:</label>
                            <input type="text" class="form-control" id="modalTicketId" readonly>
                        </div>
                        <div class="form-group">
                            <label class="font-weight-bold text-gray-700">Seleccionar Técnico / Bolsista:</label>
                            <select class="form-control" id="modalTecnicoSelect" required>
                                <!-- Populate dynamically -->
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" type="button" data-dismiss="modal">Cancelar</button>
                        <button class="btn btn-primary font-weight-bold" type="submit">Confirmar Asignación</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap core JavaScript-->
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>

    <!-- Custom scripts for all pages-->
    <script src="js/sb-admin-2.min.js"></script>

    <!-- SIGSLAB Core Logic -->
    <script src="js/sigslab.js"></script>

    <script>
        // Check role auth
        const user = window.SIGSLAB.checkAuth('jefe-soporte');

        $(document).ready(function() {
            if (user) {
                $('#userNameDisplay').text(user.name);
            }

            // Populate technicians select in modal
            const tecnicos = window.SIGSLAB.TECNICOS;
            tecnicos.forEach(function(tec) {
                $('#modalTecnicoSelect').append(new Option(tec, tec));
            });

            // Load view contents
            loadJefeDashboard();

            // Handle Logout
            $('#btnLogoutBtn').click(function(e) {
                e.preventDefault();
                window.SIGSLAB.logout();
            });

            // Handle Assignment Submit
            $('#assignForm').submit(function(e) {
                e.preventDefault();
                const ticketId = $('#modalTicketId').val();
                const tecnico = $('#modalTecnicoSelect').val();

                const result = window.SIGSLAB.assignTicket(ticketId, tecnico);
                if (result === true) {
                    $('#assignModal').modal('hide');
                    showAlert('success', `El ticket <strong>${ticketId}</strong> ha sido asignado con éxito a <strong>${tecnico}</strong> y su estado cambió a 'En proceso'.`);
                    loadJefeDashboard();
                } else if (result === "limit_reached") {
                    $('#assignModal').modal('hide');
                    showAlert('danger', `No se puede asignar el ticket. El bolsista <strong>${tecnico}</strong> ya tiene asignado el límite máximo de 12 tickets activos.`);
                } else {
                    showAlert('danger', 'Hubo un error al intentar asignar el ticket.');
                }
            });
        });

        // Load statistics cards and main table
        function loadJefeDashboard() {
            const tickets = window.SIGSLAB.getTickets();

            // Table rendering
            const tbody = $('#jefeTicketsBody');
            tbody.empty();

            tickets.reverse().forEach(function(t) {
                let statusBadge = '';
                if (t.status === 'Pendiente') {
                    statusBadge = '<span class="badge badge-ticket-pendiente">Pendiente</span>';
                } else if (t.status === 'Asignado') {
                    statusBadge = '<span class="badge badge-ticket-asignado">Asignado</span>';
                } else if (t.status === 'Finalizado') {
                    statusBadge = '<span class="badge badge-ticket-finalizado">Finalizado</span>';
                } else {
                    statusBadge = '<span class="badge badge-ticket-finalizado">Finalizado</span>';
                }

                let actionBtn = '';
                if (t.status === 'Pendiente') {
                    actionBtn = `
                        <button class="btn btn-sm btn-primary btn-block font-weight-bold" onclick="openAssignModal('${t.id}')">
                            <i class="fas fa-user-plus mr-1"></i> Asignar
                        </button>
                    `;
                } else if (t.status === 'Asignado') {
                    actionBtn = `<button class="btn btn-sm btn-light btn-block text-muted" disabled>Asignado</button>`;
                } else {
                    actionBtn = `<button class="btn btn-sm btn-light btn-block text-muted" disabled>Sin acción</button>`;
                }

                let typeBadge = t.type === 'Incidente' 
                    ? '<span class="badge badge-pill badge-danger-soft text-danger font-weight-bold"><i class="fas fa-bug mr-1"></i>Incidente</span>'
                    : '<span class="badge badge-pill badge-success-soft text-success font-weight-bold"><i class="fas fa-code mr-1"></i>Software</span>';

                const row = `
                    <tr>
                        <td><strong>${t.id}</strong></td>
                        <td>${typeBadge}</td>
                        <td>${t.lab}</td>
                        <td><code>${t.pc}</code></td>
                        <td title="${t.description}">${t.description.length > 50 ? t.description.substring(0, 50) + '...' : t.description}</td>
                        <td>${t.creator}</td>
                        <td>${t.createdDate}</td>
                        <td>${statusBadge}</td>
                        <td>${t.assignedTo || '<span class="text-muted small">No asignado</span>'}</td>
                        <td>${actionBtn}</td>
                    </tr>
                `;
                tbody.append(row);
            });
        }

        // Trigger modal layout
        function openAssignModal(ticketId) {
            $('#modalTicketId').val(ticketId);
            $('#assignModal').modal('show');
        }

        // Show feedback alerts
        function showAlert(type, message) {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
            `;
            $('#alertPlaceholder').html(alertHtml);
            $('html, body').animate({ scrollTop: 0 }, 'fast');
        }
    </script>
</body>

</html>
