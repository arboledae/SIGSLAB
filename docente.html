<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="SIGSLAB - Portal Docente">
    <meta name="author" content="SIGSLAB Team">

    <title>SIGSLAB - Portal Docente</title>

    <!-- Custom fonts for this template-->
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <link href="css/sigslab.css" rel="stylesheet">
    <style>
        .card-header {
            background-color: #f8f9fc;
            border-bottom: 1px solid #e3e6f0;
        }
        .form-label {
            font-weight: 600;
            color: #4e5d78;
        }
        .kanban-card {
            border: none;
            border-left: 4px solid #ddd;
            background-color: #fff;
            border-radius: 0.35rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .kanban-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15) !important;
        }
        .border-left-warning {
            border-left-color: #f6c23e !important;
        }
        .border-left-primary {
            border-left-color: #4e73df !important;
        }
        .border-left-success {
            border-left-color: #1cc88a !important;
        }
        .border-left-danger {
            border-left-color: #e74a3b !important;
        }
        .border-left-brand {
            border-left-color: var(--primary-color, #701618) !important;
        }
        .badge-danger-soft {
            background-color: #fadbd8;
            color: #e74a3b;
        }
        .badge-success-soft {
            background-color: #d4efdf;
            color: #1cc88a;
        }
        .kanban-column-body {
            max-height: 600px;
            overflow-y: auto;
            padding-right: 5px;
        }
        /* Custom scrollbar for Kanban column */
        .kanban-column-body::-webkit-scrollbar {
            width: 4px;
        }
        .kanban-column-body::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .kanban-column-body::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }
    </style>
</head>

<body id="page-top">

    <!-- Page Wrapper -->
    <div id="wrapper">

        <!-- Sidebar -->
        <ul class="navbar-nav sidebar sidebar-dark accordion" id="accordionSidebar">

            <!-- Sidebar - Brand -->
            <a class="sidebar-brand d-flex align-items-center justify-content-center" href="docente.html">
                <div class="sidebar-brand-icon rotate-n-15">
                    <i class="fas fa-tools"></i>
                </div>
                <div class="sidebar-brand-text mx-3">SIGSLAB <sup>Docente</sup></div>
            </a>

            <!-- Divider -->
            <hr class="sidebar-divider my-0">

            <!-- Nav Item - Dashboard -->
            <li class="nav-item active">
                <a class="nav-link" href="docente.html">
                    <i class="fas fa-fw fa-home"></i>
                    <span>Centro de Solicitudes</span></a>
            </li>

            <!-- Divider -->
            <hr class="sidebar-divider">

            <!-- Heading -->
            <div class="sidebar-heading">
                Gestión
            </div>

            <li class="nav-item">
                <a class="nav-link" href="docente-historial.html">
                    <i class="fas fa-fw fa-history"></i>
                    <span>Historial de Solicitudes</span></a>
            </li>

            <!-- Divider -->
            <hr class="sidebar-divider d-none d-md-block">

            <!-- Sidebar Toggler -->
            <div class="text-center d-none d-md-inline">
                <button class="rounded-circle border-0" id="sidebarToggle"></button>
            </div>
        </ul>
        <!-- End of Sidebar -->

        <!-- Content Wrapper -->
        <div id="content-wrapper" class="d-flex flex-column">

            <!-- Main Content -->
            <div id="content">

                <!-- Topbar -->
                <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">
                    <!-- Sidebar Toggle (Topbar) -->
                    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3">
                        <i class="fa fa-bars"></i>
                    </button>

                    <!-- Page Title Mock -->
                    <h5 class="m-0 font-weight-bold text-gray-800 d-none d-md-inline-block">Centro de Solicitudes</h5>

                    <!-- Topbar Navbar -->
                    <ul class="navbar-nav ml-auto">
                        <div class="topbar-divider d-none d-sm-block"></div>

                        <!-- Nav Item - User Information -->
                        <li class="nav-item dropdown no-arrow">
                            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                <span class="mr-2 d-none d-lg-inline text-gray-600 small" id="userNameDisplay">Docente</span>
                                <img class="img-profile rounded-circle" src="img/undraw_profile.svg">
                            </a>
                            <!-- Dropdown - User Information -->
                            <div class="dropdown-menu dropdown-menu-right shadow animated--grow-in" aria-labelledby="userDropdown">
                                <a class="dropdown-item" href="#" id="btnLogoutBtn">
                                    <i class="fas fa-sign-out-alt fa-sm fa-fw mr-2 text-gray-400"></i>
                                    Cerrar Sesión
                                </a>
                            </div>
                        </li>
                    </ul>
                </nav>
                <!-- End of Topbar -->

                <!-- Begin Page Content -->
                <div class="container-fluid">



                    <!-- Alert placeholders -->
                    <div id="alertPlaceholder"></div>

                    <!-- Content Row: Forms side by side -->
                    <div class="row">

                        <!-- Registrar Incidente Card (RF01) -->
                        <div class="col-lg-6" id="section-incidente">
                            <div class="card shadow mb-4">
                                <div class="card-header py-3 d-flex align-items-center">
                                    <i class="fas fa-exclamation-triangle text-danger mr-2" style="font-size: 1.25rem;"></i>
                                    <h6 class="m-0 font-weight-bold text-primary">Registro de Incidentes (RF01)</h6>
                                </div>
                                <div class="card-body">
                                    <form id="incidentForm">                                        <div class="form-group">
                                            <label class="form-label">Lugar de la Incidencia:</label>
                                            <input type="text" class="form-control" id="incLab" placeholder="Ej: Laboratorio 101, Biblioteca, Aula 204..." required>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">Equipo Afectado:</label>
                                            <input type="text" class="form-control" id="incPc" placeholder="Ej: PC-05, Impresora-01 o 'Ninguno'" required>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">Descripción del problema:</label>
                                            <textarea class="form-control" id="incDesc" rows="4" placeholder="Describa a detalle la falla técnica encontrada..." required></textarea>
                                        </div>
                                        <button type="submit" class="btn btn-danger btn-icon-split font-weight-bold">
                                            <span class="icon text-white-50">
                                                <i class="fas fa-bug"></i>
                                            </span>
                                            <span class="text">Reportar Incidente</span>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
 
                        <!-- Solicitud de Software Card (RF12) -->
                        <div class="col-lg-6" id="section-software">
                            <div class="card shadow mb-4">
                                <div class="card-header py-3 d-flex align-items-center">
                                    <i class="fas fa-download text-success mr-2" style="font-size: 1.25rem;"></i>
                                    <h6 class="m-0 font-weight-bold text-primary">Solicitud de Instalación de Software (RF12)</h6>
                                </div>
                                <div class="card-body">
                                    <form id="softwareForm">
                                        <div class="form-group">
                                            <label class="form-label">Lugar de Destino (Instalación):</label>
                                            <input type="text" class="form-control" id="softLab" placeholder="Ej: Laboratorio 201, Cómputo B..." required>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">Nombre del Software y Versión:</label>
                                            <input type="text" class="form-control" id="softName" placeholder="Ej: AutoCAD 2025, VS Code, Python 3.12" required>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">Observaciones adicionales:</label>
                                            <textarea class="form-control" id="softObs" rows="4" placeholder="Detalle si requiere librerías especiales, plugin de licencias, etc."></textarea>
                                        </div>
                                        <button type="submit" class="btn btn-success btn-icon-split font-weight-bold">
                                            <span class="icon text-white-50">
                                                <i class="fas fa-plus"></i>
                                            </span>
                                            <span class="text">Enviar Solicitud</span>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>



                </div>
                <!-- /.container-fluid -->

            </div>
            <!-- End of Main Content -->

            <!-- Footer -->
            <footer class="sticky-footer bg-white">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>SIGSLAB MVP 1 &copy; 2026</span>
                    </div>
                </div>
            </footer>
            <!-- End of Footer -->

        </div>
        <!-- End of Content Wrapper -->

    </div>
    <!-- End of Page Wrapper -->

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fas fa-angle-up"></i>
    </a>

    <!-- Bootstrap core JavaScript-->
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>

    <!-- Custom scripts for all pages-->
    <script src="js/sb-admin-2.min.js"></script>

    <!-- SIGSLAB Core Logic -->
    <script src="js/sigslab.js"></script>

    <script>
        // Check role auth
        const user = window.SIGSLAB.checkAuth('docente');

        $(document).ready(function() {
            if (user) {
                $('#userNameDisplay').text(user.name);
            }

            // Handle Logout
            $('#btnLogoutBtn').click(function(e) {
                e.preventDefault();
                window.SIGSLAB.logout();
            });

            // Form Submit: Incident (RF01)
            $('#incidentForm').submit(function(e) {
                e.preventDefault();
                const lab = $('#incLab').val();
                const pc = $('#incPc').val();
                const desc = $('#incDesc').val();

                window.SIGSLAB.createTicket('Incidente', lab, pc, desc, user.email);
                showAlert('success', '¡Incidente reportado exitosamente! Ha sido guardado en la cola del Jefe de Soporte.');
                
                // Reset form
                $('#incLab').val('');
                $('#incPc').val('');
                $('#incDesc').val('');
            });

            // Form Submit: Software (RF12)
            $('#softwareForm').submit(function(e) {
                e.preventDefault();
                const lab = $('#softLab').val();
                const softName = $('#softName').val();
                const obs = $('#softObs').val();
                
                const description = `Instalación de software: ${softName}. Observaciones: ${obs || "Ninguna"}`;
                
                window.SIGSLAB.createTicket('Software', lab, 'Todas las PCs', description, user.email);
                showAlert('success', '¡Solicitud de instalación de software enviada con éxito! Registrada en el sistema.');

                // Reset form
                $('#softLab').val('');
                $('#softName').val('');
                $('#softObs').val('');
            });
        });

        // Show feedback alerts
        function showAlert(type, message) {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <strong>¡Hecho!</strong> ${message}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
            `;
            $('#alertPlaceholder').html(alertHtml);
            
            // Auto scroll to top of page to see the alert
            $('html, body').animate({ scrollTop: 0 }, 'slow');
        }

        // Scroll to specific section cleanly
        function scrollToSection(id) {
            $('html, body').animate({
                scrollTop: $("#" + id).offset().top - 80
            }, 600);
        }
    </script>
</body>

</html>
