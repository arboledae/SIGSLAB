<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="SIGSLAB - Sistema Integral de Gestión de Soporte y Laboratorios">
    <meta name="author" content="SIGSLAB Team">

    <title>SIGSLAB - Iniciar Sesión</title>

    <!-- Custom fonts for this template-->
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <link href="css/sigslab.css" rel="stylesheet">
    <style>
        .login-card {
            border: none;
            border-radius: 1rem;
            overflow: hidden;
        }
    </style>
</head>

<body class="bg-login-gradient">

    <div class="container">
        <!-- Outer Row -->
        <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
            <div class="col-xl-6 col-lg-8 col-md-9">
                <div class="card o-hidden border-0 shadow-lg my-5 login-card">
                    <div class="card-body p-0">
                        <div class="p-5">
                            <div class="text-center mb-4">
                                <div class="sidebar-brand-icon rotate-n-15 text-primary mb-2" style="font-size: 3rem;">
                                    <i class="fas fa-tools"></i>
                                </div>
                                <h1 class="h3 text-gray-900 font-weight-bold">SIGSLAB</h1>
                                <p class="text-muted">Sistema Integral de Gestión de Soporte y Laboratorios</p>
                            </div>
                            
                            <form class="user" id="loginForm">
                                <div class="form-group">
                                    <label for="roleSelector" class="text-gray-700 font-weight-bold small">Seleccione un Rol de Prueba:</label>
                                    <select class="form-control" id="roleSelector" style="border-radius: 10rem; height: 50px; font-size: 0.9rem; padding: 10px 20px;">
                                        <option value="docente" data-email="docente@sigslab.edu" data-name="Prof. Sofia Arboleda">Docente</option>
                                        <option value="jefe-soporte" data-email="jefe@sigslab.edu" data-name="Ing. Marcos Paz (Jefe de Soporte)">Jefe de Soporte</option>
                                        <option value="tecnico" data-email="tecnico@sigslab.edu" data-name="Juan Pérez (Bolsista)">Técnico / Bolsista (Juan Pérez)</option>
                                    </select>
                                </div>
                                
                                <div class="form-group">
                                    <label for="emailInput" class="text-gray-700 font-weight-bold small">Correo Electrónico:</label>
                                    <input type="email" class="form-control form-control-user" id="emailInput" readonly value="docente@sigslab.edu">
                                </div>
                                
                                <div class="form-group">
                                    <label for="passwordInput" class="text-gray-700 font-weight-bold small">Contraseña:</label>
                                    <input type="password" class="form-control form-control-user" id="passwordInput" placeholder="••••••••" value="password123">
                                </div>
                                
                                <button type="submit" class="btn btn-primary btn-user btn-block font-weight-bold" style="font-size: 1rem; padding: 10px;">
                                    <i class="fas fa-sign-in-alt mr-2"></i> Iniciar Sesión
                                </button>
                            </form>
                            
                            <hr>
                            <div class="text-center small text-muted">
                                MVP 1 - Control de soporte técnico
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap core JavaScript-->
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>

    <!-- SIGSLAB Core Logic -->
    <script src="js/sigslab.js"></script>

    <script>
        $(document).ready(function() {
            // Check if user is already logged in and redirect
            const currentUser = window.SIGSLAB.getCurrentUser();
            if (currentUser) {
                redirectUser(currentUser.role);
            }

            // Update email input when role changes
            $('#roleSelector').change(function() {
                const selectedOption = $(this).find('option:selected');
                const email = selectedOption.data('email');
                $('#emailInput').val(email);
            });

            // Handle login submit
            $('#loginForm').submit(function(e) {
                e.preventDefault();
                const selectedOption = $('#roleSelector').find('option:selected');
                const role = selectedOption.val();
                const email = selectedOption.data('email');
                const name = selectedOption.data('name');

                const userSession = {
                    email: email,
                    role: role,
                    name: name
                };

                localStorage.setItem("currentUser", JSON.stringify(userSession));
                redirectUser(role);
            });

            function redirectUser(role) {
                if (role === "docente") {
                    window.location.href = "docente.html";
                } else if (role === "jefe-soporte") {
                    window.location.href = "jefe-soporte.html";
                } else if (role === "tecnico") {
                    window.location.href = "tecnico.html";
                }
            }
        });
    </script>
</body>

</html>
